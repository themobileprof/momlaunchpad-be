name: Deploy to Production

# Host port 8083 avoids legacy services on 8080 and themobileprof-backend on 3000.
# --network host matches themobileprof-backend so DATABASE_URL can use localhost.
env:
  APP_HOST_PORT: '8083'
  DEPLOY_DIR: /var/www/momlaunchpad-api

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

jobs:
  deploy:
    name: Deploy to ${{ github.event.inputs.environment || 'production' }}
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'production' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set deployment variables
        id: vars
        run: |
          if [ "${{ github.event.inputs.environment }}" == "staging" ]; then
            echo "host=${{ secrets.STAGING_SSH_HOST }}" >> $GITHUB_OUTPUT
            echo "user=${{ secrets.STAGING_SSH_USERNAME }}" >> $GITHUB_OUTPUT
          else
            echo "host=${{ secrets.SSH_HOST }}" >> $GITHUB_OUTPUT
            echo "user=${{ secrets.SSH_USERNAME }}" >> $GITHUB_OUTPUT
          fi
          echo "port=22" >> $GITHUB_OUTPUT

          if [[ $GITHUB_REF == refs/tags/* ]]; then
            # CI tags semver without "v" (0.1.4); also try sha-xxx from the main-branch build
            REF_TAG="${GITHUB_REF#refs/tags/}"
            echo "tag=${REF_TAG#v}" >> $GITHUB_OUTPUT
            echo "tag_fallback=sha-$(echo "${{ github.sha }}" | cut -c1-7)" >> $GITHUB_OUTPUT
          else
            echo "tag=latest" >> $GITHUB_OUTPUT
            echo "tag_fallback=latest" >> $GITHUB_OUTPUT
          fi

      - name: Configure SSH
        env:
          HOST: ${{ steps.vars.outputs.host }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy and run migrations on server
        env:
          HOST: ${{ steps.vars.outputs.host }}
          USER: ${{ steps.vars.outputs.user }}
          PORT: ${{ steps.vars.outputs.port }}
          TAG: ${{ steps.vars.outputs.tag }}
          TAG_FALLBACK: ${{ steps.vars.outputs.tag_fallback }}
          IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/${{ github.event.repository.name }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          HOST_PORT: ${{ env.APP_HOST_PORT }}
          DEPLOY_DIR: ${{ env.DEPLOY_DIR }}
        run: |
          SSH_OPTS="-i $HOME/.ssh/deploy_key -o StrictHostKeyChecking=yes -p $PORT"

          ssh $SSH_OPTS "$USER@$HOST" "cat > /tmp/momlaunchpad.env" << 'ENV_EOF'
          ${{ secrets.ENV_FILE }}
          ENV_EOF

          ssh $SSH_OPTS "$USER@$HOST" \
            "IMAGE=${IMAGE}" \
            "TAG=${TAG}" \
            "TAG_FALLBACK=${TAG_FALLBACK}" \
            "HOST_PORT=${HOST_PORT}" \
            "DEPLOY_DIR=${DEPLOY_DIR}" \
            "DOCKERHUB_USERNAME=${DOCKERHUB_USERNAME}" \
            "DOCKERHUB_TOKEN=${DOCKERHUB_TOKEN}" \
            bash -s << 'REMOTE'
          set -euo pipefail

          echo "Starting MomLaunchpad deploy..."

          if ! command -v docker >/dev/null 2>&1; then
            echo "Docker is not installed on the server"
            exit 1
          fi
          if ! docker info >/dev/null 2>&1; then
            echo "Docker permission denied — user may not be in the docker group"
            exit 1
          fi

          if [ ! -s /tmp/momlaunchpad.env ]; then
            echo "ENV file is missing or empty"
            exit 1
          fi

          # Host network: localhost reaches Postgres on the VM. Rewrite dev-only Docker hosts.
          if grep -qE 'host\.docker\.internal|172\.17\.0\.1' /tmp/momlaunchpad.env; then
            echo "Rewriting host.docker.internal and 172.17.0.1 -> localhost in ENV_FILE (--network host on Linux)"
            sed -i -e 's/host\.docker\.internal/localhost/g' -e 's/172\.17\.0\.1/localhost/g' /tmp/momlaunchpad.env
          fi

          mkdir -p "${DEPLOY_DIR}"
          ENV_FILE="${DEPLOY_DIR}/.env"
          UPLOADS_DIR="${DEPLOY_DIR}/uploads"
          mkdir -p "${UPLOADS_DIR}"
          chown -R 1000:1000 "${UPLOADS_DIR}" 2>/dev/null || true
          echo "Uploads directory: ${UPLOADS_DIR}"

          echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin

          RESOLVED_TAG=""
          for candidate in "${TAG}" "${TAG_FALLBACK}" "latest"; do
            if docker pull "${IMAGE}:${candidate}"; then
              RESOLVED_TAG="${candidate}"
              echo "Using image tag: ${RESOLVED_TAG}"
              break
            fi
          done
          if [ -z "${RESOLVED_TAG}" ]; then
            echo "No image found for ${IMAGE} (tried ${TAG}, ${TAG_FALLBACK}, latest)"
            exit 1
          fi

          # Replace only our container (leave themobileprof-backend and others untouched)
          docker rm -f momlaunchpad-api 2>/dev/null || true

          # Host network: Postgres on the VM listens on 127.0.0.1 only (same as themobileprof-backend).
          # Inject PORT and UPLOAD_DIR; persist env on disk (view with: cat ${DEPLOY_DIR}/.env)
          grep -v -E '^(PORT|UPLOAD_DIR)=' /tmp/momlaunchpad.env > "${ENV_FILE}.tmp"
          mv "${ENV_FILE}.tmp" "${ENV_FILE}"
          {
            echo "PORT=${HOST_PORT}"
            echo "UPLOAD_DIR=/app/uploads"
          } >> "${ENV_FILE}"
          chmod 600 "${ENV_FILE}"
          rm -f /tmp/momlaunchpad.env
          echo "Persistent env: ${ENV_FILE} ($(wc -c < "${ENV_FILE}") bytes)"

          echo "Starting container with host networking (port ${HOST_PORT})..."
          CONTAINER_ID=$(docker run -d \
            --name momlaunchpad-api \
            --restart unless-stopped \
            --network host \
            -v "${UPLOADS_DIR}:/app/uploads" \
            --env-file "${ENV_FILE}" \
            --log-driver json-file \
            --log-opt max-size=10m \
            --log-opt max-file=3 \
            "${IMAGE}:${RESOLVED_TAG}")

          if [ -z "${CONTAINER_ID}" ]; then
            echo "Failed to start container — no container ID returned"
            exit 1
          fi
          echo "Container started: ${CONTAINER_ID}"

          sleep 5
          if ! docker ps --filter "name=^momlaunchpad-api$" --filter "status=running" -q | grep -q .; then
            echo "=== momlaunchpad-api failed to stay running ==="
            docker ps -a --filter "name=^momlaunchpad-api$"
            docker logs momlaunchpad-api 2>&1 | tail -100 || true
            exit 1
          fi

          NETWORK_MODE=$(docker inspect momlaunchpad-api --format '{{.HostConfig.NetworkMode}}')
          if [ "${NETWORK_MODE}" != "host" ]; then
            echo "Expected NetworkMode=host, got ${NETWORK_MODE}"
            exit 1
          fi
          echo "NetworkMode=host confirmed"

          echo "Waiting for http://localhost:${HOST_PORT}/health ..."
          ok=0
          for i in $(seq 1 20); do
            if curl -fsS "http://localhost:${HOST_PORT}/health" >/dev/null; then
              ok=1
              break
            fi
            echo "Health check attempt ${i}/20 failed, retrying..."
            sleep 3
          done
          if [ "$ok" -ne 1 ]; then
            echo "=== Health check failed ==="
            docker logs momlaunchpad-api 2>&1 | tail -100 || true
            exit 1
          fi
          echo "Health check OK"

          # Post-deploy migrations (host can reach localhost Postgres the same way as the app)
          set -a
          # shellcheck disable=SC1091
          source "${ENV_FILE}"
          set +a

          rm -rf /tmp/momlaunchpad-migrations
          docker cp momlaunchpad-api:/app/migrations /tmp/momlaunchpad-migrations
          docker run --rm \
            --network host \
            -v /tmp/momlaunchpad-migrations:/migrations \
            migrate/migrate:v4.16.2 \
            -path=/migrations \
            -database "${DATABASE_URL}" \
            up
          rm -rf /tmp/momlaunchpad-migrations

          docker image prune -af --filter "until=24h"

          echo "Deploy and migrations complete."
          REMOTE
