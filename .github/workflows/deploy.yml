name: Deploy to Production

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

jobs:
  deploy:
    name: Deploy to ${{ github.event.inputs.environment || 'production' }}
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'production' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set deployment variables
        id: vars
        run: |
          if [ "${{ github.event.inputs.environment }}" == "staging" ]; then
            echo "host=${{ secrets.STAGING_SSH_HOST }}" >> $GITHUB_OUTPUT
            echo "user=${{ secrets.STAGING_SSH_USERNAME }}" >> $GITHUB_OUTPUT
          else
            echo "host=${{ secrets.SSH_HOST }}" >> $GITHUB_OUTPUT
            echo "user=${{ secrets.SSH_USERNAME }}" >> $GITHUB_OUTPUT
          fi
          echo "port=22" >> $GITHUB_OUTPUT

          if [[ $GITHUB_REF == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "tag=latest" >> $GITHUB_OUTPUT
          fi

      - name: Configure SSH
        env:
          HOST: ${{ steps.vars.outputs.host }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy and run migrations on server
        env:
          HOST: ${{ steps.vars.outputs.host }}
          USER: ${{ steps.vars.outputs.user }}
          PORT: ${{ steps.vars.outputs.port }}
          TAG: ${{ steps.vars.outputs.tag }}
          IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/${{ github.event.repository.name }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          SSH_OPTS="-i $HOME/.ssh/deploy_key -o StrictHostKeyChecking=yes -p $PORT"

          ssh $SSH_OPTS "$USER@$HOST" "cat > /tmp/momlaunchpad.env" << 'ENV_EOF'
          ${{ secrets.ENV_FILE }}
          ENV_EOF

          ssh $SSH_OPTS "$USER@$HOST" \
            "IMAGE=${IMAGE}" \
            "TAG=${TAG}" \
            "DOCKERHUB_USERNAME=${DOCKERHUB_USERNAME}" \
            "DOCKERHUB_TOKEN=${DOCKERHUB_TOKEN}" \
            bash -s << 'REMOTE'
          set -euo pipefail

          echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
          docker pull "${IMAGE}:${TAG}"

          docker stop momlaunchpad-api 2>/dev/null || true
          docker rm momlaunchpad-api 2>/dev/null || true

          docker run -d \
            --name momlaunchpad-api \
            --restart unless-stopped \
            -p 8080:8080 \
            --env-file /tmp/momlaunchpad.env \
            --log-driver json-file \
            --log-opt max-size=10m \
            --log-opt max-file=3 \
            "${IMAGE}:${TAG}"

          sleep 10
          curl -fsS http://localhost:8080/health

          # Post-deploy migrations (runs on server; DATABASE_URL from env file on host)
          set -a
          # shellcheck disable=SC1091
          source /tmp/momlaunchpad.env
          set +a

          rm -rf /tmp/momlaunchpad-migrations
          docker cp momlaunchpad-api:/app/migrations /tmp/momlaunchpad-migrations
          docker run --rm \
            --network host \
            -v /tmp/momlaunchpad-migrations:/migrations \
            migrate/migrate:v4.16.2 \
            -path=/migrations \
            -database "${DATABASE_URL}" \
            up
          rm -rf /tmp/momlaunchpad-migrations

          rm -f /tmp/momlaunchpad.env
          docker image prune -af --filter "until=24h"

          echo "Deploy and migrations complete."
          REMOTE
