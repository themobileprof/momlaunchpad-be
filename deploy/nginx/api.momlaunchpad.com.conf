# Minimal HTTP reverse proxy for MomLaunchpad API (momlaunchpad-api container).
# Install: sudo ln -sf /path/to/repo/deploy/nginx/api.momlaunchpad.com.conf /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx
#
# HTTPS: run certbot when ready — it will add SSL and usually a redirect:
#   sudo certbot --nginx -d api.momlaunchpad.com
#
# MomLaunchpad uses --network host with PORT=8083 (deploy workflow).

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream momlaunchpad_api {
    server 127.0.0.1:8083;
}

server {
    listen 80;
    server_name api.momlaunchpad.com;

    client_max_body_size 10M;

    location / {
        proxy_pass http://momlaunchpad_api;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
        proxy_read_timeout 300s;
    }
}
