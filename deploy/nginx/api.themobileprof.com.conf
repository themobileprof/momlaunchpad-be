# Minimal reverse proxy for MomLaunchpad API.
# Install: sudo ln -sf /path/to/repo/deploy/nginx/api.themobileprof.com.conf /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx
#
# Backend must listen on the port below (default app PORT=8080).

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream momlaunchpad_api {
    server 127.0.0.1:8080;
}

server {
    listen 80;
    server_name api.themobileprof.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.themobileprof.com;

    ssl_certificate     /etc/letsencrypt/live/api.themobileprof.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.themobileprof.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 10M;

    location / {
        proxy_pass http://momlaunchpad_api;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
        proxy_read_timeout 300s;
    }
}
